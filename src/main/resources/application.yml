server:
  port: 8080

spring:
  application:
    name: zotov-navigator
  datasource:
    url: jdbc:h2:mem:zotov;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    # data.sql должен выполняться ПОСЛЕ создания схемы Hibernate
    defer-datasource-initialization: true
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# --- Зотов.Навигатор: интеграция ---
zotov:
  scraper:
    enabled: false          # true → парсить centrezotov.ru раз в час
    interval-ms: 3600000    # интервал синхронизации (мс), default 1 час
  embed:
    allowed-origins: "*"    # frame-ancestors для iframe; в prod → https://centrezotov.ru
